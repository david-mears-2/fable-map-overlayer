<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>London Housing Heat Map</title>
    <link
      rel="icon"

  <body>
    <div id="map"></div>
